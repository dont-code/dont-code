<h2 mat-dialog-title>Save application</h2>

<div mat-dialog-content class="save-dialog-content">
  <mat-form-field appearance="outline" class="save-dialog-field">
    <mat-label>Application name</mat-label>
    <input matInput [(ngModel)]="applicationName" />
  </mat-form-field>
  <app-saved-application-link [saveResult]="lastSaveResult()"></app-saved-application-link>
</div>

<div mat-dialog-actions align="end">
  <button mat-flat-button color="primary" type="button" (click)="save()" [disabled]="!applicationName.trim()">
    Save
  </button>
  <button mat-button type="button" (click)="close()">Close</button>
</div>
