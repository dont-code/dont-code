@let repo=repository();
@if (repo.hasValue()) {
  <div class="gap-4 p-8">
    @let repoConfig = repo.value();
    <div class="text-center text-3xl text-shadow-md">
    List of apps for {{repoConfig.name}}
    </div>
    <div class="text-center text-xl italic">
    {{repoConfig.description}}
    </div>
    <div class="text-center text-2xl text-red-500">
      <a routerLink="generate/default">New ! Generate your own app thanks to AI!</a>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 p-8">
    @for (app of apps(); track app.name) {
      <div><app-app-panel [appInfo]="app" [repository]="repoConfig"/></div>
    }
  </div>
}
