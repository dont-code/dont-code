@let repo=repository();
@if (repo.hasValue()) {
  <div class="gap-4 p-8">
    <div class="text-center text-3xl text-shadow-md">
      Dont-code Application Generator !
    </div>
      @let repoConfig = repo.value();
    <div class="text-center text-2xl">
      For {{repoConfig.name}}
    </div>
    <div class="text-center text-xl italic">
      {{repoConfig.description}}
    </div>

  </div>
  <div class="gap-4 p-8">
    <form class="dialog-form">
      <mat-form-field class="dialog-full-width">
        <mat-label>Describe the application you need</mat-label>
        <textarea matInput name="question" rows="6" value="I'd like to have an application for ..."></textarea>
      </mat-form-field>
    </form>

  </div>
}
